spring:
  application:
    name: global-remittance-poc

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/remittance
    username: remittance
    password: remittance
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: fintech_remittance
        format_sql: true
    show-sql: false
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: fintech_user,fintech_payment,fintech_remittance,fintech_partner
    default-schema: fintech_remittance

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: remittance-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # Security
  security:
    jwt:
      secret: global-remittance-poc-jwt-secret-key-for-development-only-change-in-production
      access-token-expiration: 900000    # 15분
      refresh-token-expiration: 604800000 # 7일

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      partnerApi:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      partnerApi:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    instances:
      partnerApi:
        timeout-duration: 5s

# Logging
logging:
  level:
    com.remittance: DEBUG
    org.springframework.modulith: DEBUG
    org.hibernate.SQL: DEBUG

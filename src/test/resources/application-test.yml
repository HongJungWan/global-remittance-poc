spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS fintech_user\;CREATE SCHEMA IF NOT EXISTS fintech_payment\;CREATE SCHEMA IF NOT EXISTS fintech_remittance\;CREATE SCHEMA IF NOT EXISTS fintech_partner
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: PUBLIC
        format_sql: true

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

  security:
    jwt:
      secret: test-jwt-secret-key-for-testing-only
      access-token-expiration: 900000
      refresh-token-expiration: 604800000

logging:
  level:
    com.remittance: DEBUG

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (compile only)
        run: ./gradlew clean classes testClasses -x test

      - name: ArchUnit Tests (모듈 격리 + 레이어 규칙)
        run: ./gradlew test --tests "com.remittance.architecture.*"

      - name: Unit Tests (도메인 로직, 상태 전이, 환율 계산)
        run: ./gradlew test --tests "com.remittance.*.domain.*" --tests "com.remittance.*.infrastructure.*" --tests "com.remittance.shared.*"

      - name: Acceptance Tests (시나리오 기반 인수 테스트)
        run: ./gradlew test --tests "com.remittance.acceptance.*"

      - name: Full Build Verification
        run: ./gradlew build
